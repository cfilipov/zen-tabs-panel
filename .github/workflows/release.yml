name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build XPI
        run: make build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: zen-tabs-panel.xpi
          generate_release_notes: false
