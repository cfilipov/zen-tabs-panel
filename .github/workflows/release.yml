name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Build XPI
        run: make package

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: ergozen.xpi
          generate_release_notes: false
